<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    video { display: none; }

    /* Debug: camera preview in top-right corner */
    #video.debug-visible {
      display: block;
      position: fixed;
      top: 16px;
      right: 16px;
      width: 200px;
      height: auto;
      transform: scaleX(-1); /* mirror to match skeleton on canvas */
      opacity: 0.65;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      z-index: 100;
      pointer-events: none;
    }

    #debug-hint {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(255, 255, 255, 0.2);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #status {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: rgba(255,255,255,0.6);
      font-family: 'Courier New', monospace;
      z-index: 10;
      cursor: pointer;
      transition: opacity 1.5s ease;
    }
    #start-screen h1 {
      font-size: 2.5rem;
      font-weight: 100;
      letter-spacing: 0.4em;
      margin-bottom: 2rem;
      color: rgba(160, 200, 255, 0.7);
    }
    #start-screen p {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      opacity: 0.5;
    }
    #camera-controls {
      display: none;
      margin-top: 1.8rem;
    }
    #camera-select {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(160, 200, 255, 0.55);
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      padding: 0.45rem 0.9rem;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
    }
    #camera-select:hover {
      border-color: rgba(160, 200, 255, 0.35);
      color: rgba(160, 200, 255, 0.8);
    }
    #camera-select option {
      background: #0a0a12;
      color: rgba(200, 220, 255, 0.8);
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>

  <div id="start-screen">
    <h1>D R I F T</h1>
    <p>touch to begin</p>
    <div id="camera-controls">
      <select id="camera-select"></select>
    </div>
  </div>

  <div id="debug-hint">D · debug</div>
  <div id="status">initializing camera…</div>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <!-- TensorFlow.js (full bundle includes WebGL backend) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

  <!-- MoveNet pose detection -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

  <script src="pose.js"></script>
  <script src="audio.js"></script>
  <script src="balls.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
